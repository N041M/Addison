<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Addison</title>
    <script>
      // Theme bootstrap — runs before the stylesheet loads so there's no flash
      // of the wrong theme. Reads "addison.theme" ("light" | "dark" | "system",
      // default light), resolves "system" against the OS preference, sets the
      // class the Tailwind palette keys off, and paints the background
      // immediately. App.tsx keeps localStorage in sync (and follows OS changes
      // live while "system" is chosen) afterwards. Mirror of lib/theme.ts — this
      // runs before the bundle loads, so it can't import it; keep them in step.
      (function () {
        try {
          var t = localStorage.getItem("addison.theme");
          if (t !== "light" && t !== "dark" && t !== "system") t = "light";
          var dark =
            t === "dark" ||
            (t === "system" &&
              typeof window.matchMedia === "function" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var root = document.documentElement;
          if (dark) root.classList.add("dark");
          root.style.backgroundColor = dark ? "#171D1A" : "#F6F5F1";
        } catch (e) {
          document.documentElement.style.backgroundColor = "#F6F5F1";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
